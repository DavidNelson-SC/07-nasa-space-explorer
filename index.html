<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <h1>Space Explorer</h1>
    </header>

    <section class="fact-card" aria-labelledby="fact-heading">
      <p class="eyebrow">Did You Know?</p>
      <h2 id="fact-heading">Random space fact</h2>
      <p id="spaceFact" class="fact-text"></p>
    </section>

    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <button id="fetchButton" type="button">Get Space Images</button>
    </div>

    <p id="statusMessage" class="status-message" aria-live="polite"></p>

    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>

    <div id="modal" class="modal" aria-hidden="true">
      <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button id="closeModal" class="modal-close" type="button" aria-label="Close modal">×</button>
        <div id="modalMedia" class="modal-media"></div>
        <div class="modal-content">
          <p class="eyebrow">NASA APOD</p>
          <h2 id="modalTitle"></h2>
          <p id="modalDate" class="modal-date"></p>
          <p id="modalExplanation" class="modal-explanation"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
